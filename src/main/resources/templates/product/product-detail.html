<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .shake-animation { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .btn-check:checked + .btn-outline-primary {
            background-color: #0d6efd; color: white;
            box-shadow: 0 4px 8px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body class="bg-light" onload="loadProductDetail()">
    <div class="container mt-4">
        <div class="card shadow-sm border-0">
            <div class="card-header fw-bold bg-dark text-white py-3">
                <i class="bi bi-info-circle me-2"></i>CHI TIẾT SẢN PHẨM
            </div>
            <div class="card-body p-4">
                <div class="row" id="product-content">
                    <div class="col-md-5 text-center mb-4 mb-md-0">
                        <img id="p-image" class="img-fluid rounded shadow-sm border" style="max-height: 400px; object-fit: contain;">
                    </div>
                    
                    <div class="col-md-7">
                        <h2 id="p-name" class="text-primary fw-bold"></h2>
                        <h4 id="p-price" class="text-danger fw-bold mt-3"></h4>
                        
                        <div class="my-3 p-3 bg-light rounded">
                            <div class="mb-1"><strong>Ngày đăng:</strong> <span id="p-date"></span></div>
                            <div><strong>Loại hàng:</strong> <span id="p-category" class="badge bg-info text-dark"></span></div>
                        </div>
                        
                        <hr class="my-4">

                        <div id="orderForm">
                            <div class="mb-4">
                                <label class="fw-bold mb-3 d-block"><i class="bi bi-rulers me-2"></i>Chọn Size giày:</label>
                                <div id="size-options" class="d-flex gap-2 flex-wrap">
                                    </div>
                                <div id="size-error-msg" class="text-danger small mt-2 fw-bold" style="display:none;">
                                    <i class="bi bi-exclamation-triangle-fill me-1"></i> Vui lòng chọn một kích cỡ!
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex mt-4">
                                <button type="button" onclick="addToCart()" class="btn btn-success btn-lg px-5 shadow-sm">
                                    <i class="bi bi-cart-plus me-2"></i>ĐẶT MUA NGAY
                                </button>
                                <button type="button" class="btn btn-outline-danger btn-lg px-3 shadow-sm">
                                    <i class="bi bi-heart-fill"></i>
                                </button>
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="mt-3">
                            <h5 class="fw-bold text-secondary"><i class="bi bi-card-text me-2"></i>Mô tả sản phẩm</h5>
                            <p id="p-description" class="text-muted lh-base" style="white-space: pre-line; text-align: justify;"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        axios.defaults.withCredentials = true;

        // 1. Lấy ID sản phẩm từ URL (ví dụ: /product/detail/123)
        const urlPath = window.location.pathname;
        const productId = urlPath.split('/').pop();

        async function loadProductDetail() {
            try {
                // Gọi API của Thiện
                const res = await axios.get(`/api/products/${productId}`);
                const p = res.data;

                // Đổ dữ liệu
                document.getElementById('p-name').innerText = p.name;
                document.getElementById('p-price').innerText = p.price.toLocaleString('vi-VN') + " VNĐ";
                document.getElementById('p-image').src = `/images/${p.image}`;
                document.getElementById('p-date').innerText = p.createDate;
                document.getElementById('p-category').innerText = p.category.name;
                document.getElementById('p-description').innerText = p.description || "Chưa có mô tả.";

                // Đổ danh sách Size
                let sizeHtml = '';
                p.sizes.forEach(s => {
                    sizeHtml += `
                        <div>
                            <input type="radio" class="btn-check" name="size" id="size${s.id}" value="${s.id}">
                            <label class="btn btn-outline-primary px-4 py-2" for="size${s.id}">${s.sizeValue}</label>
                        </div>`;
                });
                document.getElementById('size-options').innerHTML = sizeHtml;
            } catch (err) {
                console.error("Lỗi:", err);
                alert("Không tìm thấy sản phẩm!");
            }
        }

        // 2. Hàm thêm vào giỏ hàng
        async function addToCart() {
            const sizeRadio = document.querySelector('input[name="size"]:checked');
            const errorMsg = document.getElementById('size-error-msg');
            const form = document.getElementById('orderForm');

            if (!sizeRadio) {
                errorMsg.style.display = 'block';
                form.classList.add('shake-animation');
                setTimeout(() => form.classList.remove('shake-animation'), 500);
                return;
            }

            errorMsg.style.display = 'none';
            const sizeId = sizeRadio.value;

            try {
                // Gọi API của Thiện
                const res = await axios.post(`/api/cart/add/${productId}?size=${sizeId}`);
                alert(res.data.message);
                window.location.href = "/cart/view";
            } catch (err) {
                alert("Lỗi: Vui lòng đăng nhập để mua hàng!");
            }
        }
    </script>
</body>
</html>
