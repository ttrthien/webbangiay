<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sản phẩm</title>

<style>
.product-card {
	transition: transform 0.3s ease, box-shadow 0.3s ease;
	cursor: pointer;
}

.product-card:hover {
	transform: translateY(-8px);
	box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
}

.card-img-top {
	transition: transform 0.5s ease;
}

.product-card:hover .card-img-top {
	transform: scale(1.05);
}
</style>
</head>

<body>

	<div class="container-fluid p-0">

		<!-- 🔍 FILTER -->
		<div class="card border-0 shadow-sm mb-4">
			<div class="card-body p-3">
				<form onsubmit="event.preventDefault(); searchProducts();"
					class="row g-2 align-items-center">

					<!-- SEARCH -->
					<div class="col-md-4">
						<div class="input-group">
							<span class="input-group-text bg-white border-end-0"> <i
								class="bi bi-search"></i>
							</span> <input type="text" id="keyword"
								class="form-control border-start-0 ps-0"
								placeholder="Tìm tên giày...">
						</div>
					</div>

					<!-- CATEGORY -->
					<div class="col-md-3">
						<select id="cid" class="form-select">
							<option value="">Tất cả hãng</option>
							<option th:each="c : ${categories}" th:value="${c.id}"
								th:text="${c.name}"></option>
						</select>
					</div>

					<!-- SIZE -->
					<div class="col-md-2">
						<select id="size" class="form-select">
							<option value="">Size</option>
							<option value="1">38</option>
							<option value="2">39</option>
							<option value="3">40</option>
							<option value="4">41</option>
						</select>
					</div>

					<!-- BUTTON -->
					<div class="col-md-3 d-grid">
						<button type="submit" class="btn btn-primary fw-bold shadow-sm">
							<i class="bi bi-funnel-fill me-1"></i> LỌC
						</button>
					</div>

				</form>
			</div>
		</div>

		<!-- 📦 PRODUCT LIST -->
		<div class="card border-0 shadow-sm">
			<div
				class="card-header bg-white border-bottom fw-bold text-uppercase py-3">
				<i class="bi bi-grid-3x3-gap-fill me-2 text-primary"></i>Danh sách
				sản phẩm
			</div>

			<div class="card-body">
				<div class="row" id="productList">
					<!-- render bằng JS -->
				</div>
			</div>
		</div>

	</div>

	<!-- 🚀 SCRIPT -->
	<script>
async function searchProducts() {
    let keyword = document.getElementById("keyword").value;
    let cid = document.getElementById("cid").value;
    let size = document.getElementById("size").value;

    let url = `/api/products/advanced-search?`;

    if (keyword) url += `keyword=${keyword}&`;
    if (cid) url += `categoryId=${cid}&`;
    if (size) url += `sizeId=${size}&`;

    try {
        let res = await fetch(url);
        let data = await res.json();

        renderProducts(data);
    } catch (err) {
        console.error("Lỗi API:", err);
    }
}

function renderProducts(products) {
    let html = "";

    if(products.length === 0){
        html = `<div class="text-center text-muted">Không có sản phẩm</div>`;
    }

    products.forEach(p => {
        html += `
        <div class="col-6 col-md-3 mb-4">
            <div class="card h-100 product-card border-0 shadow-sm">
                
                <a href="/product/detail/${p.id}">
                    <img src="/images/${p.image}" 
                         onerror="this.src='/images/default.png'"
                         class="card-img-top" 
                         style="height:220px; object-fit:cover;">
                </a>

                <div class="card-body text-center p-2">
                    <h6 class="fw-bold small text-truncate">
                        ${p.name}
                    </h6>

                    <div class="text-danger fw-bold">
                        ${formatPrice(p.price)} ₫
                    </div>
                </div>

                <div class="card-footer bg-white border-0 p-2">
                    <button class="btn btn-dark w-100 btn-sm fw-bold"
                        onclick="addToCart(${p.id})">
                        <i class="bi bi-cart-plus"></i> MUA NGAY
                    </button>
                </div>

            </div>
        </div>
        `;
    });

    document.getElementById("productList").innerHTML = html;
}

function formatPrice(price){
    return price.toLocaleString('vi-VN');
}

// load lần đầu
searchProducts();
</script>

</body>
</html>
