<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của bạn</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-danger text-white fw-bold py-3">
                <div class="d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-cart-check-fill me-2"></i> GIỎ HÀNG CỦA BẠN</span>
                    <span id="cart-badge" class="badge bg-white text-danger rounded-pill">0 món</span>
                </div>
            </div>
            
            <div class="card-body p-0">
                <div id="empty-cart" class="text-center py-5 d-none">
                    <div class="display-1 text-muted opacity-25 mb-3"><i class="bi bi-cart-x"></i></div>
                    <h5 class="text-muted">Chưa có sản phẩm nào trong giỏ hàng!</h5>
                    <a href="/home/index" class="btn btn-warning mt-3 px-4 fw-bold shadow-sm">TIẾP TỤC MUA SẮM</a>
                </div>

                <div id="cart-content" class="table-responsive d-none">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-center small">
                            <tr>
                                <th class="text-start ps-4">Sản phẩm</th>
                                <th>Size</th>
                                <th>Giá bán</th>
                                <th style="width: 130px;">Số lượng</th>
                                <th>Thành tiền</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="cart-tbody">
                            </tbody>
                    </table>
                </div>
            </div>
            
            <div id="cart-footer" class="card-footer bg-white border-top p-4 d-none">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <button onclick="clearCart()" class="btn btn-link text-danger text-decoration-none small fw-bold p-0">
                            <i class="bi bi-trash"></i> XÓA SẠCH GIỎ HÀNG
                        </button>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <div class="mb-3">
                            <span class="text-muted me-2">Tổng thanh toán:</span>
                            <span id="total-amount" class="h4 fw-bold text-danger">0 ₫</span>
                        </div>
                        <a href="/order/checkout" class="btn btn-success btn-lg px-5 shadow fw-bold">
                            TIẾP TỤC THANH TOÁN <i class="bi bi-chevron-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH BẮT BUỘC: Giữ Session giỏ hàng
        axios.defaults.withCredentials = true;

        // 1. Tải giỏ hàng khi vào trang
        async function loadCart() {
            try {
                const res = await axios.get('/api/cart');
                renderCart(res.data);
            } catch (err) {
                console.error("Lỗi load giỏ hàng", err);
            }
        }

        // 2. Đổ dữ liệu ra HTML
        function renderCart(cart) {
            const badge = document.getElementById('cart-badge');
            const emptyBox = document.getElementById('empty-cart');
            const contentBox = document.getElementById('cart-content');
            const footer = document.getElementById('cart-footer');
            const tbody = document.getElementById('cart-tbody');

            badge.innerText = `${cart.count} món`;

            if (cart.count === 0) {
                emptyBox.classList.remove('d-none');
                contentBox.classList.add('d-none');
                footer.classList.add('d-none');
            } else {
                emptyBox.classList.add('d-none');
                contentBox.classList.remove('d-none');
                footer.classList.remove('d-none');

                let html = '';
                cart.items.forEach(item => {
                    html += `
                        <tr>
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <img src="/images/${item.image}" class="rounded border shadow-sm me-3" style="width: 60px; height: 60px; object-fit: cover;">
                                    <div>
                                        <div class="fw-bold text-dark">${item.name}</div>
                                        <small class="text-muted">Mã: #${item.id}</small>
                                    </div>
                                </div>
                            </td>
                            <td class="text-center"><span class="badge bg-secondary px-3">${item.size}</span></td>
                            <td class="text-end">${item.price.toLocaleString()} ₫</td>
                            <td>
                                <input type="number" value="${item.qty}" min="1" 
                                    onchange="updateQty(${item.id}, ${item.size}, this.value)"
                                    class="form-control form-control-sm text-center shadow-sm mx-auto" style="width: 70px;">
                            </td>
                            <td class="text-end text-danger fw-bold">${(item.price * item.qty).toLocaleString()} ₫</td>
                            <td class="pe-4 text-center">
                                <button onclick="removeItem(${item.id}, ${item.size})" class="btn btn-sm btn-link text-danger p-0">
                                    <i class="bi bi-trash3-fill fs-5"></i>
                                </button>
                            </td>
                        </tr>`;
                });
                tbody.innerHTML = html;
                document.getElementById('total-amount').innerText = `${cart.amount.toLocaleString()} ₫`;
            }
        }

        // 3. Các hàm xử lý API
        async function updateQty(id, size, qty) {
            await axios.put(`/api/cart/update/${id}?size=${size}&qty=${qty}`);
            loadCart(); // Load lại dữ liệu ngầm không reload trang
        }

        async function removeItem(id, size) {
            if (confirm('Xóa đôi này khỏi giỏ?')) {
                await axios.delete(`/api/cart/remove/${id}?size=${size}`);
                loadCart();
            }
        }

        async function clearCart() {
            if (confirm('Bạn có chắc muốn làm trống giỏ hàng?')) {
                await axios.get('/api/cart/clear'); // Giả định Thiện có API clear
                loadCart();
            }
        }

        loadCart();
    </script>
</body>
</html>
