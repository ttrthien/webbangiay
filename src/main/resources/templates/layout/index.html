<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>CAMEDO HOUSE - Giày Thời Trang</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .sticky-sidebar { position: sticky; top: 100px; z-index: 900; }
        .banner-img { width: 100%; height: 180px; object-fit: cover; }
        .logo-img { height: 40px; margin-right: 10px; }
        .nav-link { font-weight: 500; transition: 0.3s; }
        .nav-link:hover { color: #ffc107 !important; }
        #main-view { min-height: 600px; transition: opacity 0.2s; }
        .loading-fade { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <img th:src="@{/images/banner.jpg}" class="banner-img" alt="Banner">
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 sticky-top shadow">
        <div class="container-fluid px-5">
            <div class="d-flex align-items-center">
                <a class="navbar-brand d-flex align-items-center text-warning fw-bold me-3" th:href="@{/home/index}">
                    <img th:src="@{/images/logo.png}" class="logo-img" alt="Logo"> CAMEDO
                </a>
                
                <ul th:if="${session.user != null and session.user.admin}" class="navbar-nav d-none d-lg-flex align-items-center border-start border-secondary ps-2 ms-2">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-info" href="#" data-bs-toggle="dropdown" style="font-size: 0.85rem;">
                            <i class="bi bi-box-seam me-1"></i> Quản lý
                        </a>
                        <ul class="dropdown-menu shadow mt-2">
                            <li><a class="dropdown-item small" th:href="@{/admin/product/index}">Sản phẩm</a></li>
                            <li><a class="dropdown-item small" th:href="@{/admin/category/index}">Danh mục</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-info" th:href="@{/admin/order/index}" style="font-size: 0.85rem;">
                            <i class="bi bi-cart-check me-1"></i> Đơn hàng
                        </a>
                    </li>
                </ul>
            </div>

            <div class="collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item me-2">
                        <a class="nav-link position-relative" th:href="@{/cart/view}">
                            <i class="bi bi-cart3 fs-5"></i>
                            <span id="cart-badge" class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle" 
                                  style="font-size: 0.65rem;" th:text="${session.cart != null ? session.cart.count : 0}">0</span>
                        </a>
                    </li>

                    <th:block th:if="${session.user == null}">
                        <li class="nav-item"><a class="btn btn-outline-info btn-sm fw-bold px-3" th:href="@{/account/sign-up}">Đăng ký</a></li>
                        <li class="nav-item"><a class="btn btn-outline-warning btn-sm fw-bold px-3" th:href="@{/auth/login}">Đăng nhập</a></li>
                    </th:block>

                    <th:block th:if="${session.user != null}">
                        <li class="nav-item dropdown ms-2">
                            <a class="nav-link dropdown-toggle text-warning fw-bold border border-warning rounded px-3" href="#" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-1"></i> [[${session.user.fullname}]]
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow mt-2">
                                <li><a class="dropdown-item" th:href="@{/account/edit-profile}">Hồ sơ</a></li>
                                <li><a class="dropdown-item" th:href="@{/order/list}">Đơn hàng</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" th:href="@{/auth/logoff}">Đăng xuất</a></li>
                            </ul>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5">
        <div class="row">
            <div class="col-md-2 mb-3">
                <div class="sticky-sidebar">
                    <div th:replace="~{layout/menu :: menu}"></div>
                </div>
            </div>
            <div class="col-md-10">
                <div id="main-view">
                    <div th:replace="~{${view}}"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:inline="javascript">
        axios.defaults.withCredentials = true;

        /**
         * Hàm điều hướng Single Page
         */
        async function showPage(url, id) {
            const fullUrl = url + (id ? '/' + id : '');
            if (id) window.currentProductId = id;
            
            window.history.pushState({ path: fullUrl, pid: id }, '', fullUrl);
            await renderContent(fullUrl);
        }

        /**
         * Hàm nạp nội dung fragment
         */
        async function renderContent(url) {
            const view = document.getElementById('main-view');
            view.classList.add('loading-fade');

            try {
                const response = await axios.get(url, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                
                view.innerHTML = response.data;

                // Ép chạy lại script trong trang con
                const scripts = view.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.text = oldScript.text;
                    document.head.appendChild(newScript).parentNode.removeChild(newScript);
                });
                
                window.scrollTo(0, 0);
            } catch (err) {
                console.error("Lỗi nạp nội dung:", err);
                if(!url.includes('api')) window.location.href = url;
            } finally {
                view.classList.remove('loading-fade');
            }
        }

        /**
         * Xử lý nút Back của trình duyệt
         */
        window.onpopstate = function(event) {
            const url = window.location.pathname;
            if(event.state && event.state.pid) {
                window.currentProductId = event.state.pid;
            }
            renderContent(url);
        };

        function updateCartBadge(count) {
            const badge = document.getElementById("cart-badge");
            if (badge) badge.innerText = count;
        }

        var serverMsg = /*[[${message}]]*/ "";
        if (serverMsg) {
            Swal.fire({ icon: 'info', title: 'Thông báo', text: serverMsg, timer: 2000 });
        }
    </script>
</body>
</html>
