<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>CAMEDO HOUSE - Giày Thời Trang</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sticky-sidebar { position: sticky; top: 100px; z-index: 900; }
        .banner-img { width: 100%; height: 180px; object-fit: cover; }
        .logo-img { height: 40px; margin-right: 10px; }
        .nav-link { font-weight: 500; transition: 0.3s; }
        .nav-link:hover { color: #ffc107 !important; }
        #main-view { min-height: 600px; transition: opacity 0.3s; }
        .loading-fade { opacity: 0.4; pointer-events: none; }
        .dropdown-menu { border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 10px; }
        .dropdown-item { padding: 10px 20px; transition: 0.2s; }
        .dropdown-item:hover { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <img th:src="@{/images/banner.jpg}" class="banner-img" alt="Banner">
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 sticky-top shadow">
        <div class="container-fluid px-5">
            <div class="d-flex align-items-center">
                <a class="navbar-brand d-flex align-items-center text-warning fw-bold me-3" th:href="@{/home/index}">
                    <img th:src="@{/images/logo.png}" class="logo-img" alt="Logo"> CAMEDO
                </a>
                
                <ul th:if="${session.user != null and session.user.admin}" class="navbar-nav d-none d-lg-flex align-items-center border-start border-secondary ps-2 ms-2">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-info" href="#" data-bs-toggle="dropdown" style="font-size: 0.85rem;">
                            <i class="bi bi-box-seam me-1"></i> Quản lý
                        </a>
                        <ul class="dropdown-menu mt-2 shadow">
                            <li><a class="dropdown-item small" href="javascript:void(0)" onclick="showPage('/admin/product/index')">Sản phẩm</a></li>
                            <li><a class="dropdown-item small" href="javascript:void(0)" onclick="showPage('/admin/category/index')">Danh mục</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-info" href="javascript:void(0)" onclick="showPage('/admin/order/index')" style="font-size: 0.85rem;">
                            <i class="bi bi-cart-check me-1"></i> Đơn hàng
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-info" href="javascript:void(0)" onclick="showPage('/admin/account/index')" style="font-size: 0.85rem;">
                            <i class="bi bi-person-gear me-1"></i> Tài khoản
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-warning" href="#" data-bs-toggle="dropdown" style="font-size: 0.85rem;">
                            <i class="bi bi-graph-up-arrow me-1"></i> Thống kê
                        </a>
                        <ul class="dropdown-menu mt-2 shadow">
                            <li><a class="dropdown-item small" href="javascript:void(0)" onclick="showPage('/admin/report/revenue')">Doanh thu theo loại</a></li>
                            <li><a class="dropdown-item small" href="javascript:void(0)" onclick="showPage('/admin/report/vip')">Khách hàng VIP</a></li>
                        </ul>
                    </li>
                </ul>
            </div>

            <div class="collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item me-2">
                        <a class="nav-link position-relative" href="javascript:void(0)" onclick="showPage('/cart/view')">
                            <i class="bi bi-cart3 fs-5"></i>
                            <span id="cart-badge" class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle" 
                                  style="font-size: 0.65rem;" th:text="${session.cart != null ? session.cart.count : 0}">0</span>
                        </a>
                    </li>

                    <th:block th:if="${session.user == null}">
                        <li class="nav-item"><a class="btn btn-outline-info btn-sm fw-bold px-3" th:href="@{/account/sign-up}">Đăng ký</a></li>
                        <li class="nav-item"><a class="btn btn-outline-warning btn-sm fw-bold px-3" th:href="@{/auth/login}">Đăng nhập</a></li>
                    </th:block>

                    <th:block th:if="${session.user != null}">
                        <li class="nav-item dropdown ms-2">
                            <a class="nav-link dropdown-toggle text-warning fw-bold border border-warning rounded px-3" href="#" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-1"></i> [[${session.user.fullname}]]
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow mt-2">
                                <li><a class="dropdown-item" href="javascript:void(0)" onclick="showPage('/account/edit-profile')"><i class="bi bi-person-badge me-2"></i> Hồ sơ</a></li>
                                <li><a class="dropdown-item" href="javascript:void(0)" onclick="showPage('/account/change-password')"><i class="bi bi-shield-lock me-2"></i> Đổi mật khẩu</a></li>
                                <li><a class="dropdown-item" href="javascript:void(0)" onclick="showPage('/order/list')"><i class="bi bi-bag-check me-2"></i> Đơn hàng</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" th:href="@{/auth/logoff}"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a></li>
                            </ul>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5">
        <div class="row">
            <div class="col-md-2 mb-3">
                <div class="sticky-sidebar">
                    <div th:replace="~{layout/menu :: menu}"></div>
                </div>
            </div>
            <div class="col-md-10">
                <div id="main-view">
                    <div th:replace="~{${view}}"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:inline="javascript">
        axios.defaults.withCredentials = true;

        async function showPage(url, id) {
            const fullUrl = url + (id ? '/' + id : '');
            window.history.pushState({ path: fullUrl }, '', fullUrl);
            await renderContent(fullUrl);
        }

        async function renderContent(url) {
            const view = document.getElementById('main-view');
            view.classList.add('loading-fade');

            try {
                const response = await axios.get(url, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                
                view.innerHTML = response.data;

                // Xóa các script tạm cũ
                document.querySelectorAll('.temp-script').forEach(s => s.remove());

                // Nạp script mới từ fragment vừa tải
                setTimeout(() => {
                    const scripts = view.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        newScript.className = 'temp-script';
                        if (oldScript.src) {
                            newScript.src = oldScript.src;
                            newScript.async = false;
                        } else {
                            newScript.text = oldScript.text;
                        }
                        document.body.appendChild(newScript);
                    });
                }, 50); 
                
                window.scrollTo(0, 0);
            } catch (err) {
                console.error("Lỗi SPA:", err);
                if(!url.includes('api')) window.location.href = url;
            } finally {
                view.classList.remove('loading-fade');
            }
        }

        window.onpopstate = function() {
            renderContent(window.location.pathname);
        };

        function updateCartBadge(count) {
            const badge = document.getElementById("cart-badge");
            if (badge) badge.innerText = count;
        }

        var serverMsg = /*[[${message}]]*/ "";
        if (serverMsg) {
            Swal.fire({ icon: 'info', title: 'Thông báo', text: serverMsg, timer: 2000 });
        }
    </script>
</body>
</html>
