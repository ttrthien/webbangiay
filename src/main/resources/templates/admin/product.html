<div class="container-fluid mt-4 mb-5">
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 sticky-form">
                <div class="card-header bg-primary text-white py-2 shadow-sm" id="formHeader">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-1"></i> THIẾT LẬP SẢN PHẨM</h6>
                </div>
                <div class="card-body p-3">
                    <form id="productForm" onsubmit="saveProduct(event)">
                        <input type="hidden" id="productId">
                        <div class="mb-2"><label class="form-label fw-bold small">Tên giày</label><input type="text" id="productName" class="form-control form-control-sm" required></div>
                        <div class="row">
                            <div class="col-6 mb-2"><label class="form-label fw-bold small">Giá</label><input type="number" id="productPrice" class="form-control form-control-sm" required></div>
                            <div class="col-6 mb-2"><label class="form-label fw-bold small">Thương hiệu</label><select id="productCategory" class="form-select form-select-sm" required></select></div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-bold small">Size hiện có</label>
                            <div id="sizeContainer" class="p-2 border rounded bg-light d-flex flex-wrap gap-2"></div>
                        </div>
                        <div class="mb-2"><label class="form-label fw-bold small">Ảnh sản phẩm</label><input type="file" id="productImage" class="form-control form-control-sm"></div>
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" id="btnSaveProd" class="btn btn-primary btn-sm fw-bold">LƯU DỮ LIỆU</button>
                            <button type="button" class="btn btn-light btn-sm border" onclick="resetProdForm()">Làm mới</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white py-2 fw-bold small">DANH SÁCH SẢN PHẨM</div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0 table-sm">
                        <thead class="table-light small"><tr><th>Mã</th><th>Ảnh</th><th>Tên</th><th>Giá</th><th>Thao tác</th></tr></thead>
                        <tbody id="productTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    var API_P = '/api/admin/products', API_C = '/api/admin/categories', API_S = '/api/admin/sizes';
    async function initProductPage() {
        const [rc, rs, rp] = await Promise.all([axios.get(API_C), axios.get(API_S), axios.get(API_P)]);
        document.getElementById('productCategory').innerHTML = rc.data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('sizeContainer').innerHTML = rs.data.map(s => `<div class="form-check"><input type="checkbox" value="${s.id}" class="sz-cb form-check-input" id="s${s.id}"><label class="form-check-label small" for="s${s.id}">${s.sizeValue}</label></div>`).join('');
        renderProducts(rp.data);
    }
    function renderProducts(data) {
        document.getElementById('productTableBody').innerHTML = data.map(p => `<tr>
            <td class="small fw-bold">${p.id}</td>
            <td><img src="/images/${p.image}" class="rounded border" style="width: 40px; height: 40px; object-fit: cover;"></td>
            <td class="text-start small fw-bold">${p.name}</td>
            <td class="text-danger fw-bold small">${new Intl.NumberFormat('vi-VN').format(p.price)} ₫</td>
            <td><button class="btn btn-sm btn-outline-danger border-0" onclick="deleteProd(${p.id})"><i class="bi bi-trash"></i></button></td>
        </tr>`).join('');
    }
    async function saveProduct(e) {
        e.preventDefault();
        const fd = new FormData();
        fd.append('name', document.getElementById('productName').value);
        fd.append('price', document.getElementById('productPrice').value);
        fd.append('category.id', document.getElementById('productCategory').value);
        Array.from(document.querySelectorAll('.sz-cb:checked')).forEach(cb => fd.append('sizes', cb.value));
        if(document.getElementById('productImage').files[0]) fd.append('photo_file', document.getElementById('productImage').files[0]);
        await axios.post(API_P, fd); initProductPage();
    }
    initProductPage();
</script>
