<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .sticky-form { position: sticky; top: 20px; z-index: 100; }
        .size-check-group { display: flex; flex-wrap: wrap; gap: 8px; border: 1px solid #dee2e6; padding: 8px; border-radius: 5px; background: #f8f9fa; }
    </style>
</head>
<body>
<div class="container-fluid mt-4">
    <div class="row g-3">
        <div class="col-md-4"> 
            <div class="card shadow-sm sticky-form border-0">
                <div class="card-header bg-primary text-white py-2 shadow-sm" id="formHeader">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-1"></i> THÊM MỚI SẢN PHẨM</h6>
                </div>
                <div class="card-body p-3">
                    <form id="productForm" onsubmit="saveProduct(event)" enctype="multipart/form-data">
                        <input type="hidden" name="id" id="productId">
                        
                        <div class="mb-2">
                            <label class="form-label fw-bold">Tên giày</label> 
                            <input type="text" id="productName" name="name" class="form-control" required placeholder="Tên sản phẩm...">
                        </div>

                        <div class="row">
                            <div class="col-6 mb-2">
                                <label class="form-label fw-bold">Giá (VNĐ)</label> 
                                <input type="number" id="productPrice" name="price" step="any" class="form-control" required>
                            </div>
                            <div class="col-6 mb-2">
                                <label class="form-label fw-bold">Thương hiệu</label> 
                                <select id="productCategory" name="category.id" class="form-select" required>
                                    <option value="">-- Chọn hãng --</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-bold">Mô tả chi tiết</label>
                            <textarea id="productDesc" name="description" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-bold">Size hiện có</label>
                            <div id="sizeContainer" class="size-check-group">
                                <span class="small text-muted">Đang tải size...</span>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-bold">Ảnh sản phẩm</label> 
                            <input type="file" id="productImage" name="photo_file" class="form-control" accept="image/*"> 
                            <div class="mt-2 text-center">
                                <img id="previewImage" src="" class="rounded border shadow-sm" style="max-height: 70px; display: none;">
                            </div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" id="checkAvail" name="available" class="form-check-input" value="true" checked> 
                            <label class="form-check-label small" for="checkAvail">Đang kinh doanh</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" id="btnSave" class="btn btn-primary btn-sm fw-bold shadow-sm">LƯU SẢN PHẨM</button>
                            <button type="button" class="btn btn-light btn-sm text-secondary border" onclick="resetForm()">Làm mới form</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white py-2">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-table"></i> DANH SÁCH SẢN PHẨM</h6>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle table-sm text-center">
                            <thead class="table-light small">
                                <tr>
                                    <th>Mã</th>
                                    <th>Ảnh</th>
                                    <th class="text-start">Tên sản phẩm</th>
                                    <th>Hãng</th>
                                    <th>Giá bán</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="productTableBody">
                                <tr><td colspan="7">Đang tải dữ liệu...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Định nghĩa các URL API (Hãy đảm bảo bạn đã có API cho sizes)
    const API_PRODUCTS = '/api/admin/products';
    const API_CATEGORIES = '/api/admin/categories';
    const API_SIZES = '/api/admin/sizes'; // Cần tạo thêm SizeRestController nếu chưa có

    // Tự động load dữ liệu khi vào trang
    document.addEventListener('DOMContentLoaded', () => {
        loadCategories();
        loadSizes();
        loadProducts();
    });

    // 1. Tải danh sách Hãng (Category)
    function loadCategories() {
        axios.get(API_CATEGORIES).then(res => {
            const select = document.getElementById('productCategory');
            select.innerHTML = '<option value="">-- Chọn hãng --</option>';
            res.data.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }).catch(err => console.error("Lỗi tải category", err));
    }

    // 2. Tải danh sách Kích cỡ (Size)
    function loadSizes() {
        axios.get(API_SIZES).then(res => {
            const container = document.getElementById('sizeContainer');
            container.innerHTML = '';
            res.data.forEach(s => {
                container.innerHTML += `
                    <div class="form-check size-item">
                        <input type="checkbox" class="form-check-input size-checkbox" value="${s.id}" name="sizes" id="size${s.id}">
                        <label class="form-check-label small" for="size${s.id}">${s.sizeValue}</label>
                    </div>
                `;
            });
        }).catch(err => {
            document.getElementById('sizeContainer').innerHTML = '<span class="text-danger small">Lỗi tải size, vui lòng kiểm tra API /api/admin/sizes</span>';
        });
    }

    // 3. Tải danh sách Sản Phẩm (Product)
    function loadProducts() {
        axios.get(API_PRODUCTS).then(res => {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = '';
            
            if(res.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">Chưa có sản phẩm nào.</td></tr>';
                return;
            }

            res.data.forEach(p => {
                // Format số tiền VNĐ
                const priceFmt = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(p.price);
                const statusBadge = p.available ? '<span class="badge bg-success">Đang bán</span>' : '<span class="badge bg-secondary">Ngừng bán</span>';
                const cateName = p.category ? p.category.name : 'N/A';
                const imgTag = p.image ? `<img src="/images/${p.image}" class="rounded border" style="height: 35px; width: 35px; object-fit: cover;">` : '<span class="small text-muted">No IMG</span>';

                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${p.id}</td>
                        <td>${imgTag}</td>
                        <td class="text-start fw-bold small">${p.name}</td>
                        <td><span class="badge border text-dark">${cateName}</span></td>
                        <td class="text-danger fw-bold small">${priceFmt}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-info border-0" onclick="editProduct(${p.id})"><i class="bi bi-pencil-square"></i></button> 
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteProduct(${p.id})"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }).catch(err => {
            document.getElementById('productTableBody').innerHTML = '<tr><td colspan="7" class="text-danger">Lỗi tải danh sách sản phẩm!</td></tr>';
        });
    }

    // 4. Reset Form
    function resetForm() {
        document.getElementById('productForm').reset();
        document.getElementById('productId').value = '';
        
        // Ẩn ảnh xem trước
        document.getElementById('previewImage').style.display = 'none';
        document.getElementById('previewImage').src = '';
        
        // Đổi trạng thái UI
        document.getElementById('formHeader').classList.replace('bg-warning', 'bg-primary');
        document.getElementById('formHeader').innerHTML = '<h6 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-1"></i> THÊM MỚI SẢN PHẨM</h6>';
        document.getElementById('btnSave').innerText = 'LƯU THÊM MỚI';
        document.getElementById('btnSave').classList.replace('btn-warning', 'btn-primary');
    }

    // 5. Đưa dữ liệu lên Form để Sửa
    function editProduct(id) {
        axios.get(`${API_PRODUCTS}/${id}`).then(res => {
            const p = res.data;
            
            // Đổ dữ liệu text
            document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.name;
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productCategory').value = p.category ? p.category.id : '';
            document.getElementById('productDesc').value = p.description || '';
            document.getElementById('checkAvail').checked = p.available;

            // Hiển thị ảnh hiện tại
            const previewImg = document.getElementById('previewImage');
            if (p.image) {
                previewImg.src = '/images/' + p.image;
                previewImg.style.display = 'inline-block';
            } else {
                previewImg.style.display = 'none';
            }

            // Tick các checkbox sizes mà sản phẩm đang có
            // Reset tất cả tick trước
            document.querySelectorAll('.size-checkbox').forEach(cb => cb.checked = false);
            if (p.sizes && p.sizes.length > 0) {
                p.sizes.forEach(sz => {
                    let cb = document.getElementById('size' + sz.id);
                    if (cb) cb.checked = true;
                });
            }

            // Thay đổi giao diện form sang chế độ Sửa
            document.getElementById('formHeader').classList.replace('bg-primary', 'bg-warning');
            document.getElementById('formHeader').innerHTML = '<h6 class="mb-0 fw-bold text-dark"><i class="bi bi-pencil-square me-1"></i> CẬP NHẬT SẢN PHẨM #' + p.id + '</h6>';
            document.getElementById('btnSave').innerText = 'CẬP NHẬT THAY ĐỔI';
            document.getElementById('btnSave').classList.replace('btn-primary', 'btn-warning');
            
            // Cuộn mượt lên trên cùng chỗ có form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }).catch(err => alert("Không thể tải thông tin sản phẩm!"));
    }

    // 6. Lưu Sản Phẩm (Thêm hoặc Cập nhật)
    function saveProduct(event) {
        event.preventDefault(); // Ngăn submit form chuẩn
        
        const form = document.getElementById('productForm');
        const formData = new FormData(form);
        const id = document.getElementById('productId').value;

        // Nếu có ID -> Cập nhật (PUT), Không có ID -> Thêm mới (POST)
        const url = id ? `${API_PRODUCTS}/${id}` : API_PRODUCTS;
        const method = id ? 'put' : 'post';

        axios({
            method: method,
            url: url,
            data: formData,
            headers: { 'Content-Type': 'multipart/form-data' } // Bắt buộc để gửi file ảnh
        }).then(res => {
            alert(id ? 'Cập nhật sản phẩm thành công!' : 'Thêm mới sản phẩm thành công!');
            resetForm();
            loadProducts(); // Load lại bảng ngay lập tức
        }).catch(err => {
            alert('Lỗi: Không thể lưu sản phẩm!');
            console.error(err);
        });
    }

    // 7. Xóa Sản Phẩm
    function deleteProduct(id) {
        if (confirm(`Bạn có chắc chắn muốn xóa vĩnh viễn sản phẩm #${id} này?`)) {
            axios.delete(`${API_PRODUCTS}/${id}`)
                .then(() => {
                    alert('Đã xóa sản phẩm!');
                    loadProducts(); // Load lại bảng
                }).catch(err => {
                    alert('Lỗi: Sản phẩm này có thể đang nằm trong Đơn hàng của khách, không thể xóa!');
                });
        }
    }
</script>
</body>
</html>
