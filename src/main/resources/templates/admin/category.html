<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Danh Mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-bold">QUẢN LÝ DANH MỤC</div>
        <div class="card-body">
            
            <form id="categoryForm" onsubmit="saveCategory(event)">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Mã loại</label>
                        <input id="cateId" class="form-control" required placeholder="Nhập mã danh mục..."> 
                    </div>
                    <div class="col-md-8">
                        <label class="form-label fw-bold">Tên loại</label>
                        <input id="cateName" class="form-control" required placeholder="Nhập tên danh mục...">
                    </div>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-success" id="btnSave">Thêm mới</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">Làm mới</button>
                </div>
            </form>
            <hr>
            
            <table class="table table-bordered table-hover text-center align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mã Danh Mục</th>
                        <th>Tên Danh Mục</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="categoryTableBody">
                    <tr><td colspan="3">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Biến cờ để xác định trạng thái đang là THÊM hay SỬA
    let isEditing = false;

    // 1. NGAY KHI TRANG LOAD XONG -> GỌI API LẤY DANH SÁCH
    document.addEventListener("DOMContentLoaded", function() {
        loadCategories();
    });

    // HÀM LẤY DANH SÁCH TỪ DATABASE
    function loadCategories() {
        axios.get('/api/admin/categories')
            .then(function (response) {
                const categories = response.data;
                const tbody = document.getElementById('categoryTableBody');
                tbody.innerHTML = ''; // Xóa chữ "Đang tải dữ liệu..."

                if (categories.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">Chưa có danh mục nào trong database.</td></tr>';
                    return;
                }

                // Vẽ từng dòng của bảng
                categories.forEach(c => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="fw-bold">${c.id}</td>
                        <td class="text-start">${c.name}</td>
                        <td>
                            <button type="button" class="btn btn-sm btn-info text-white" onclick="editCategory('${c.id}', '${c.name}')">Sửa</button>
                            <button type="button" class="btn btn-sm btn-danger" onclick="deleteCategory('${c.id}')">Xóa</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(function (error) {
                console.error(error);
                document.getElementById('categoryTableBody').innerHTML = '<tr><td colspan="3" class="text-danger">Lỗi không thể tải dữ liệu từ API!</td></tr>';
            });
    }

    // 2. HÀM CHUẨN BỊ FORM ĐỂ SỬA
    function editCategory(id, name) {
        document.getElementById('cateId').value = id;
        document.getElementById('cateName').value = name;
        
        // Khóa ô Mã loại không cho sửa
        document.getElementById('cateId').setAttribute('readonly', 'readonly');
        
        // Đổi trạng thái nút và biến cờ
        document.getElementById('btnSave').innerText = 'Cập nhật thay đổi';
        document.getElementById('btnSave').classList.replace('btn-success', 'btn-warning');
        isEditing = true;
    }

    // 3. HÀM RESET FORM VỀ TRẠNG THÁI BAN ĐẦU
    function resetForm() {
        document.getElementById('categoryForm').reset();
        document.getElementById('cateId').removeAttribute('readonly');
        document.getElementById('btnSave').innerText = 'Thêm mới';
        document.getElementById('btnSave').classList.replace('btn-warning', 'btn-success');
        isEditing = false;
    }

    // 4. HÀM LƯU (THÊM HOẶC SỬA)
    function saveCategory(event) {
        event.preventDefault(); // Ngăn form tự reload trang

        const id = document.getElementById('cateId').value.trim();
        const name = document.getElementById('cateName').value.trim();
        const data = { id: id, name: name };

        if (isEditing) {
            // Gọi API CẬP NHẬT (PUT)
            axios.put(`/api/admin/categories/${id}`, data)
                .then(res => {
                    alert('Cập nhật danh mục thành công!');
                    resetForm();
                    loadCategories(); // Tải lại bảng ngay lập tức
                }).catch(err => {
                    alert('Lỗi cập nhật: ' + (err.response?.data || err.message));
                });
        } else {
            // Gọi API THÊM MỚI (POST)
            axios.post('/api/admin/categories', data)
                .then(res => {
                    alert('Thêm mới danh mục thành công!');
                    resetForm();
                    loadCategories(); // Tải lại bảng ngay lập tức
                }).catch(err => {
                    alert('Lỗi thêm mới: ' + (err.response?.data || 'Mã danh mục đã tồn tại!'));
                });
        }
    }

    // 5. HÀM XÓA DANH MỤC
    function deleteCategory(id) {
        if (confirm(`Bạn có chắc chắn muốn xóa danh mục mã [${id}] không?`)) {
            axios.delete(`/api/admin/categories/${id}`)
                .then(() => {
                    alert('Xóa thành công!');
                    loadCategories(); // Tải lại bảng sau khi xóa
                }).catch(err => {
                    alert('Không thể xóa! Danh mục này có thể đang chứa sản phẩm.');
                });
        }
    }
</script>
</body>
</html>
