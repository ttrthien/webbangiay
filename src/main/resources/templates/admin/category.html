<div class="container mt-4 mb-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white fw-bold py-3"><i class="bi bi-tags-fill me-2"></i>QUẢN LÝ DANH MỤC</div>
        <div class="card-body">
            <form id="categoryForm" onsubmit="saveCategory(event)">
                <div class="row mb-3">
                    <div class="col-md-4"><label class="form-label fw-bold small">Mã loại</label><input id="cateId" class="form-control" required></div>
                    <div class="col-md-8"><label class="form-label fw-bold small">Tên loại</label><input id="cateName" class="form-control" required></div>
                </div>
                <button type="submit" class="btn btn-success fw-bold" id="btnSaveCate">THÊM MỚI</button>
                <button type="button" class="btn btn-secondary fw-bold" onclick="resetCateForm()">LÀM MỚI</button>
            </form>
            <hr class="my-4">
            <table class="table table-bordered text-center align-middle">
                <thead class="table-light small"><tr><th>Mã</th><th>Tên danh mục</th><th>Thao tác</th></tr></thead>
                <tbody id="categoryTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    var API_CATE = '/api/admin/categories';
    async function loadCategories() {
        const res = await axios.get(API_CATE);
        document.getElementById('categoryTableBody').innerHTML = res.data.map(c => `<tr>
            <td class="fw-bold">${c.id}</td><td class="text-start">${c.name}</td>
            <td>
                <button class="btn btn-sm btn-info text-white" onclick="editCate('${c.id}', '${c.name}')">Sửa</button>
                <button class="btn btn-sm btn-danger" onclick="deleteCate('${c.id}')">Xóa</button>
            </td></tr>`).join('');
    }
    function editCate(id, name) {
        document.getElementById('cateId').value = id;
        document.getElementById('cateId').readOnly = true;
        document.getElementById('cateName').value = name;
        document.getElementById('btnSaveCate').innerText = 'CẬP NHẬT';
    }
    function resetCateForm() {
        document.getElementById('categoryForm').reset();
        document.getElementById('cateId').readOnly = false;
        document.getElementById('btnSaveCate').innerText = 'THÊM MỚI';
    }
    async function saveCategory(e) {
        e.preventDefault();
        const data = { id: document.getElementById('cateId').value, name: document.getElementById('cateName').value };
        if(document.getElementById('cateId').readOnly) await axios.put(`${API_CATE}/${data.id}`, data);
        else await axios.post(API_CATE, data);
        resetCateForm(); loadCategories();
    }
    async function deleteCate(id) {
        if(confirm('Xóa danh mục?')) { await axios.delete(`${API_CATE}/${id}`); loadCategories(); }
    }
    loadCategories();
</script>
