<div class="card shadow-sm border-0 mt-4 mb-5">
    <div class="card-header bg-warning text-dark fw-bold py-3 d-flex justify-content-between align-items-center">
        <span><i class="bi bi-cart-check-fill me-2"></i> QUẢN LÝ ĐƠN HÀNG</span>
        <span class="badge bg-dark px-3" id="orderCount">...</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-dark small">
                    <tr><th>ID</th><th>Khách hàng</th><th>Ngày đặt</th><th>Trạng thái</th><th>Thao tác</th></tr>
                </thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    var API_ORD = '/api/admin/orders';
    async function loadAdminOrders() {
        const res = await axios.get(API_ORD);
        document.getElementById('orderCount').innerText = res.data.length + ' đơn';
        document.getElementById('orderTableBody').innerHTML = res.data.map(o => `<tr>
            <td class="fw-bold text-primary">#${o.id}</td>
            <td class="text-start"><b>${o.account.username}</b><br><small class="text-muted">${o.address}</small></td>
            <td class="small">${new Date(o.createDate).toLocaleDateString('vi-VN')}</td>
            <td><span class="badge bg-info">Trạng thái: ${o.status}</span></td>
            <td><button onclick="showPage('/admin/order/detail', ${o.id})" class="btn btn-sm btn-outline-info border-0"><i class="bi bi-eye-fill"></i> Xem</button></td>
        </tr>`).join('');
    }
    loadAdminOrders();
</script>
