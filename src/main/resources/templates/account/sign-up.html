<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white fw-bold py-3 text-center">
                        <h4 class="mb-0">ĐĂNG KÝ TÀI KHOẢN</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="alert-box" class="alert d-none"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập</label>
                                <input type="text" id="username" class="form-control" placeholder="Nhập username">
                                <small id="err-username" class="text-danger fst-italic"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Mật khẩu</label>
                                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu">
                                <small id="err-password" class="text-danger fst-italic"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ và tên</label>
                                <input type="text" id="fullname" class="form-control" placeholder="Nhập họ tên">
                                <small id="err-fullname" class="text-danger fst-italic"></small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" id="email" class="form-control" placeholder="Nhập email">
                                <small id="err-email" class="text-danger fst-italic"></small>
                            </div>

                            <button type="button" onclick="handleRegister()" class="btn btn-success w-100 fw-bold py-2 mt-3">
                                ĐĂNG KÝ NGAY
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3 bg-white">
                        <span>Đã có tài khoản?</span> 
                        <a href="/auth/login" class="text-success fw-bold text-decoration-none">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình để đồng bộ Session (nếu cần)
        axios.defaults.withCredentials = true;

        async function handleRegister() {
            // 1. Lấy dữ liệu từ giao diện
            const accountData = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                fullname: document.getElementById('fullname').value.trim(),
                email: document.getElementById('email').value.trim()
            };

            // 2. Xóa các thông báo lỗi cũ
            clearErrors();

            // 3. Gọi API đăng ký của Trí Thiện
            try {
                const response = await axios.post('/api/auth/register', accountData);
                
                if (response.data.success) {
                    showAlert('success', response.data.message);
                    // Chuyển hướng sau 2 giây
                    setTimeout(() => {
                        window.location.href = "/auth/login";
                    }, 2000);
                }
            } catch (error) {
                if (error.response) {
                    const data = error.response.data;
                    showAlert('danger', data.message || "Đăng ký thất bại!");
                    
                    // Nếu có lỗi validation chi tiết từ server (nếu Thiện có làm)
                    if (data.errors) {
                        for (const key in data.errors) {
                            const errEl = document.getElementById(`err-${key}`);
                            if (errEl) errEl.innerText = data.errors[key];
                        }
                    }
                } else {
                    showAlert('danger', "Không thể kết nối đến máy chủ!");
                }
            }
        }

        function showAlert(type, message) {
            const box = document.getElementById('alert-box');
            box.className = `alert alert-${type}`;
            box.innerText = message;
            box.classList.remove('d-none');
        }

        function clearErrors() {
            document.querySelectorAll('small[id^="err-"]').forEach(el => el.innerText = '');
            document.getElementById('alert-box').classList.add('d-none');
        }
    </script>
</body>
</html>
