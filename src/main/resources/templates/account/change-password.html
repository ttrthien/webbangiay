<div class="card shadow-sm">
    <div class="card-header bg-warning text-dark fw-bold py-3">
        <i class="bi bi-shield-lock me-2"></i> ĐỔI MẬT KHẨU
    </div>
    <div class="card-body">
        <form id="changePasswordForm" onsubmit="changePassword(event)">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input th:value="${session.user.username}" class="form-control bg-light" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu hiện tại</label>
                <input id="oldPassword" type="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu mới</label>
                <input id="newPassword" type="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Xác nhận mật khẩu mới</label>
                <input id="confirmPassword" type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Đổi mật khẩu</button>
        </form>
    </div>
</div>

<script>
    async function changePassword(event) {
        event.preventDefault();

        const oldPass = document.getElementById('oldPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;

        // Kiểm tra khớp mật khẩu ở phía Client trước
        if (newPass !== confirmPass) {
            Swal.fire('Lỗi', 'Xác nhận mật khẩu mới không khớp!', 'warning');
            return;
        }

        try {
            const response = await axios.post('/api/account/change-password', {
                oldPassword: oldPass,
                newPassword: newPass
            });

            if (response.data.success) {
                await Swal.fire('Thành công', response.data.message, 'success');
                // Chuyển hướng về trang login vì session đã bị hủy
                window.location.href = '/auth/login';
            }
        } catch (error) {
            const msg = error.response?.data?.message || "Lỗi đổi mật khẩu!";
            Swal.fire('Lỗi', msg, 'error');
        }
    }
</script>
