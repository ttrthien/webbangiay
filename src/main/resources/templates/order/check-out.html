<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đơn hàng</title>
    </head>
<body>
    <div class="container mt-4 mb-5">
        <h2 class="text-primary mb-4 text-center fw-bold">XÁC NHẬN ĐƠN HÀNG</h2>

        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-person-badge-fill me-2"></i>Thông tin người nhận</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Người mua:</label> 
                            <input type="text" id="fullname" 
                                   th:value="${session.user.fullname}" 
                                   class="form-control bg-light fw-bold" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Ngày đặt:</label> 
                            <input type="text" id="orderDate" class="form-control bg-white" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa chỉ giao hàng:</label>
                            <textarea id="address" class="form-control border-primary" rows="3"
                                placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."></textarea>
                            <div id="address-error" class="text-danger small mt-1 d-none">Vui lòng nhập địa chỉ nhận hàng!</div>
                        </div>
                        <div class="mt-4 border p-3 rounded bg-light">
                            <label class="form-label fw-bold d-block mb-2">Phương thức thanh toán:</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="cod" value="COD" checked> 
                                <label class="form-check-label" for="cod">Tiền mặt (COD)</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="vnpay" value="VNPAY"> 
                                <label class="form-check-label" for="vnpay">Online (VNPay)</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-info text-white py-3">
                        <h5 class="mb-0"><i class="bi bi-cart-check-fill me-2"></i>Sản phẩm đã chọn</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Sản phẩm</th>
                                        <th class="text-center">Số lượng</th>
                                        <th class="text-end">Giá</th>
                                        <th class="text-end pe-3">Tổng</th>
                                    </tr>
                                </thead>
                                <tbody id="cart-items">
                                    </tbody>
                                <tfoot>
                                    <tr class="table-warning">
                                        <td colspan="3" class="text-end fw-bold py-3">TỔNG THANH TOÁN:</td>
                                        <td class="text-end fw-bold text-danger h5 py-3 pe-3" id="total-amount">0 ₫</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-between py-3">
                        <button type="button" onclick="showPage('/cart/view')" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i> Sửa giỏ hàng
                        </button>
                        <button type="button" id="btn-confirm" onclick="confirmOrder()" class="btn btn-success px-5 fw-bold shadow">
                            XÁC NHẬN ĐẶT HÀNG
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. KHỞI TẠO DỮ LIỆU
         */
        (async function initCheckout() {
            // Hiển thị ngày hiện tại
            document.getElementById('orderDate').value = new Date().toLocaleDateString('vi-VN');
            
            try {
                // Gọi API lấy giỏ hàng (đã cấu hình withCredentials ở index.html)
                const res = await axios.get('/api/cart');
                const { items, amount } = res.data;

                if (!items || items.length === 0) {
                    Swal.fire('Giỏ hàng trống', 'Vui lòng chọn sản phẩm trước!', 'warning');
                    showPage('/home/index');
                    return;
                }
                
                // Đổ sản phẩm vào bảng
                let html = '';
                items.forEach(item => {
                    html += `
                        <tr class="align-middle">
                            <td class="ps-3">
                                <div class="fw-bold text-dark">${item.name}</div>
                                <small class="badge bg-secondary">Size: ${item.size}</small>
                            </td>
                            <td class="text-center">${item.qty}</td>
                            <td class="text-end">${item.price.toLocaleString('vi-VN')} ₫</td>
                            <td class="text-end fw-bold text-danger pe-3">${(item.price * item.qty).toLocaleString('vi-VN')} ₫</td>
                        </tr>`;
                });
                document.getElementById('cart-items').innerHTML = html;
                document.getElementById('total-amount').innerText = amount.toLocaleString('vi-VN') + ' ₫';

            } catch (error) {
                console.error("Lỗi checkout:", error);
                if (error.response?.status === 401) {
                    window.location.href = "/auth/login";
                }
            }
        })();

        /**
         * 2. XÁC NHẬN ĐẶT HÀNG
         */
        async function confirmOrder() {
            const address = document.getElementById('address').value.trim();
            const method = document.querySelector('input[name="paymentMethod"]:checked').value;
            const err = document.getElementById('address-error');

            if(!address) {
                err.classList.remove('d-none');
                document.getElementById('address').focus();
                return;
            }
            err.classList.add('d-none');

            const btn = document.getElementById('btn-confirm');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang xử lý...';

            try {
                const orderBody = { address: address, paymentMethod: method };
                const res = await axios.post('/api/orders/checkout', orderBody);
                
                if(res.data.success) {
                    if(method === 'VNPAY' && res.data.vnpayUrl) {
                        window.location.href = res.data.vnpayUrl;
                    } else {
                        await Swal.fire('Thành công', 'Đơn hàng của bạn đã được ghi nhận!', 'success');
                        window.location.href = "/order/list"; 
                    }
                }
            } catch (error) {
                const msg = error.response?.data?.message || "Lỗi kết nối Server!";
                Swal.fire('Lỗi đặt hàng', msg, 'error');
                btn.disabled = false;
                btn.innerHTML = 'XÁC NHẬN ĐẶT HÀNG';
            }
        }
    </script>
</body>
</html>
