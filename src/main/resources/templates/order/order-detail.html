<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="card shadow border-0">
            <div class="card-header bg-info text-white py-3">
                <h4 class="mb-0">
                    <i class="bi bi-info-circle-fill me-2"></i>CHI TIẾT ĐƠN HÀNG #<span id="det-order-id"></span>
                </h4>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-sm-6 border-end">
                        <p class="mb-1"><strong>Người đặt:</strong> <span id="det-fullname"></span></p>
                        <p class="mb-1"><strong>Ngày đặt:</strong> <span id="det-date"></span></p>
                        <p class="mb-0"><strong>Phương thức:</strong> <span id="det-method" class="badge bg-light text-dark border"></span></p>
                    </div>
                    <div class="col-sm-6 ps-md-4">
                        <p class="mb-1"><strong>Địa chỉ giao:</strong> <span id="det-address"></span></p>
                        <p class="mb-0"><strong>Trạng thái:</strong> <span id="det-status-badge"></span></p>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered align-middle">
                        <thead class="table-light text-center">
                            <tr>
                                <th>STT</th>
                                <th>Ảnh</th>
                                <th>Sản phẩm</th>
                                <th>Size</th>
                                <th>Đơn giá</th>
                                <th>Số lượng</th>
                                <th>Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody id="det-items-body">
                            </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3">
                <button onclick="showPage('/order/list')" class="btn btn-secondary shadow-sm">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại danh sách
                </button>

                <div class="h5 mb-0">
                    <strong>TỔNG CỘNG: </strong>
                    <span id="det-total-amount" class="text-danger fw-bold">0 ₫</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (async function loadOrderDetail() {
            // Lấy ID từ window (do hàm showPage lưu lại)
            const orderId = window.currentOrderId; 
            if(!orderId) return;

            try {
                // Gọi API lấy chi tiết đơn hàng (Nhớ thêm hàm này vào Java Controller)
                const res = await axios.get(`/api/orders/${orderId}`);
                const order = res.data;

                // 1. Thông tin header
                document.getElementById('det-order-id').innerText = order.id;
                document.getElementById('det-fullname').innerText = order.account.fullname;
                document.getElementById('det-date').innerText = new Date(order.createDate).toLocaleString('vi-VN');
                document.getElementById('det-method').innerText = order.paymentMethod;
                document.getElementById('det-address').innerText = order.address;

                // 2. Trạng thái
                const statusClasses = ['bg-warning text-dark', 'bg-success', 'bg-info text-white', 'bg-primary'];
                const statusTexts = ['Chờ thanh toán', 'Đã thanh toán/Xác nhận', 'Đang giao hàng', 'Hoàn thành'];
                document.getElementById('det-status-badge').innerHTML = 
                    `<span class="badge ${statusClasses[order.status]}">${statusTexts[order.status]}</span>`;

                // 3. Danh sách sản phẩm
                let html = '';
                let total = 0;
                order.orderDetails.forEach((d, index) => {
                    const subtotal = d.price * d.quantity;
                    total += subtotal;
                    html += `
                        <tr>
                            <td class="text-center">${index + 1}</td>
                            <td class="text-center">
                                <img src="/images/${d.product.image}" width="60" class="rounded shadow-sm" onerror="this.src='/images/default.png'">
                            </td>
                            <td class="fw-bold text-dark">${d.product.name}</td>
                            <td class="text-center"><span class="badge bg-secondary">${d.size}</span></td>
                            <td class="text-end">${d.price.toLocaleString('vi-VN')} ₫</td>
                            <td class="text-center">${d.quantity}</td>
                            <td class="text-end text-danger fw-bold">${subtotal.toLocaleString('vi-VN')} ₫</td>
                        </tr>`;
                });
                document.getElementById('det-items-body').innerHTML = html;
                document.getElementById('det-total-amount').innerText = total.toLocaleString('vi-VN') + ' ₫';

            } catch (error) {
                console.error("Lỗi tải chi tiết đơn hàng:", error);
            }
        })();
    </script>
</body>
</html>
